# GGUF Switchboard model registry (schema version 1)
#
# Use short aliases in API requests (e.g. "gemma-4-e4b") instead of full GGUF filenames.
# Link this file from config.toml:  models_file = "models.toml"
#
# Generate automatically from configured model directories:
#   ./gguf-switchboard discover-models /path/to/models -o models.toml
#
# discover-models also writes a portable models.json alongside this file.
# deploy.sh syncs the production registry to models.local.toml / models.local.json.
#
# Multiple directories (comma-separated):
#   models_dir = "/models,/home/you/extra-gguf"

version = 1

[defaults]
# Root directory (or comma-separated directories) scanned for llama.cpp-loadable GGUF files.
models_dir = "/models"
llama_server = "/usr/local/bin/llama-server"
host = "127.0.0.1"
base_port = 8081
# Fallback context when VRAM heuristics do not apply; see config.toml `vram_gb`.
# 16384 is safe on most consumer GPUs — raise to 32768/65536 if you have headroom.
context_size = 16384
ngl = 999
backend = "llama.cpp"

# Register every llama.cpp-loadable .gguf under models_dir that is not listed below.
# Sidecars (mmproj*, projector, adapter, tokenizer, mtp-*, vocab, LoRA) and files that
# fail GGUF header/metadata checks are skipped. Explicit [[models]] pins use the same
# validation and are warn+skipped when they fail (path existence alone is not enough).
auto_discover = true

# Optional [[models]] entries pin aliases, display names, ports, or priority for
# specific files. The GGUF must still pass validation to be registered.
# Any other valid .gguf under models_dir is picked up by auto_discover.
#
# [[models]]
# alias = "gemma-4-e4b"
# file = "gemma-4-E4B-it-Q4_K_M.gguf"
# display_name = "Gemma 4 E4B"
# kind = "chat"              # chat | coder | vision | embedding (inferred when omitted)
# enabled = true             # false = hide from /v1/models and scheduling
# priority = true            # idle auto-load target (only one). discover-models prefers gemma-4-e4b when present.
# context_size = 16384       # pin for consumer GPUs; omit to use vram_gb heuristic from config.toml
# description = "..."        # optional; filled by sync-hf-metadata when empty
# max_context_length = 131072  # model ceiling from HF/GGUF (distinct from serving context_size)
# min_vram_gb = 6            # approximate weights floor (GB); filled by sync-hf-metadata
# capabilities = ["tools", "vision"]
# hf_repo = "lmstudio-community/Qwen3.5-9B-GGUF"
# extra_args = ["--chat-template", "llama3"]  # Llama 3.1 plain-text chat (auto for llama-3.1)
# extra_args = ["--jinja"]                    # use GGUF tool-calling template instead
#
# Enrich empty metadata fields from Hugging Face (does not overwrite explicit pins):
#   ./gguf-switchboard sync-hf-metadata models.toml
