name: CI

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, Dev]
    tags: ["v*"]
  pull_request:
    branches: [main, Dev]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  SWAGGER_UI_OVERWRITE_FOLDER: ${{ github.workspace }}/swagger-ui-overrides

jobs:
  ci:
    name: CI
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Dev' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@5cb072d7354962be830356aa6b146f7612846014 # v2.7.5
        with:
          cache-on-failure: true
          cache-all-crates: true

      - name: Run checks
        run: ./precommit.sh

  build-release:
    name: Build release (${{ matrix.target }})
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: gguf-switchboard-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: gguf-switchboard-linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: gguf-switchboard-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: gguf-switchboard-darwin-arm64

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Ensure release tag is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/main" || {
            echo "Release tags must point to a commit on main."
            exit 1
          }

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@5cb072d7354962be830356aa6b146f7612846014 # v2.7.5
        with:
          key: release-${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/gguf-switchboard || true

      - name: Rename artifact
        run: cp target/${{ matrix.target }}/release/gguf-switchboard ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create release
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0

      - name: Generate checksums
        run: |
          for dir in gguf-switchboard-*/; do
            (cd "$dir" && sha256sum * >> ../checksums.txt)
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          body_path: releases/${{ github.ref_name }}.md
          files: |
            gguf-switchboard-linux-amd64/*
            gguf-switchboard-linux-arm64/*
            gguf-switchboard-darwin-amd64/*
            gguf-switchboard-darwin-arm64/*
            checksums.txt
