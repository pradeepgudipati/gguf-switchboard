name: CI

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  SWAGGER_UI_OVERWRITE_FOLDER: ${{ github.workspace }}/swagger-ui-overrides

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Cache ~/.cargo (registry, git deps) and target/ (compiled deps).
      # Keys are auto-derived from Cargo.lock + rustc version; PRs restore main's cache.
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-all-crates: true

      - name: Run checks
        run: ./precommit.sh

  build-release:
    name: Build release (${{ matrix.target }})
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: gguf-switchboard-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: gguf-switchboard-linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: gguf-switchboard-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: gguf-switchboard-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/gguf-switchboard || true

      - name: Rename artifact
        run: cp target/${{ matrix.target }}/release/gguf-switchboard ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create release
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate checksums
        run: |
          for dir in gguf-switchboard-*/; do
            (cd "$dir" && sha256sum * >> ../checksums.txt)
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            gguf-switchboard-linux-amd64/*
            gguf-switchboard-linux-arm64/*
            gguf-switchboard-darwin-amd64/*
            gguf-switchboard-darwin-arm64/*
            checksums.txt
