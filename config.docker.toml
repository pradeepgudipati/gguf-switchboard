bind = "0.0.0.0:9090"
startup_timeout = 120
idle_timeout = 600
default_backend = "llama.cpp"
database_path = "/var/lib/gguf-switchboard/usage.db"
vram_gb = 12
auto_ngl = false

memory_warning_threshold = 85
memory_critical_threshold = 95
memory_check_interval_secs = 30

# Models are defined in models.docker.toml (short aliases → GGUF files).
# Only ONE model is loaded at a time; a different request unloads the current one first.
models_file = "models.docker.toml"
