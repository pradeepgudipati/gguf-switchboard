# Docker-specific configuration
# llama-server runs on the host; the container reaches it via host.docker.internal.
# Start your llama-server on the host first, then: docker compose up -d --build

bind = "0.0.0.0:9090"
startup_timeout = 60
idle_timeout = 600
default_backend = "llama.cpp"
database_path = "/var/lib/openai-runtime/usage.db"

# ─── Models ───────────────────────────────────────────────────────────────────
# command is unused when backends are already running on the host.
# backend_url / health_url point to host.docker.internal so the container
# can reach the host network.

[models.local-gemma-code]
backend = "llama.cpp"
display_name = "Gemma 3 Coding Model"
command = "echo"          # not used — backend already running on host
args = ["noop"]
backend_url = "http://host.docker.internal:8081/v1"
health_url = "http://host.docker.internal:8081/health"
priority = true

[models.local-qwen-coder]
backend = "llama.cpp"
display_name = "Qwen 2.5 Coder"
command = "echo"
args = ["noop"]
backend_url = "http://host.docker.internal:8082/v1"
health_url = "http://host.docker.internal:8082/health"
priority = false

[models.local-llama-3]
backend = "llama.cpp"
display_name = "Llama 3.2 3B"
command = "echo"
args = ["noop"]
backend_url = "http://host.docker.internal:8083/v1"
health_url = "http://host.docker.internal:8083/health"
priority = false
