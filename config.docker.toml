bind = "0.0.0.0:9090"
startup_timeout = 120
idle_timeout = 600
default_backend = "llama.cpp"
database_path = "/var/lib/openai-runtime/usage.db"

memory_warning_threshold = 85
memory_critical_threshold = 95
memory_check_interval_secs = 30

# ─── Models ───────────────────────────────────────────────────────────────────
# The runtime auto-starts/stops llama-server per model.
# Only ONE model is loaded at a time (RTX 3060 12GB constraint).
# When a different model is requested, the current one is unloaded first.

# Thinking model — reasoning enabled by default. Use max_tokens 2048+ in API requests.
[models.gemma-4-e4b]
backend = "llama.cpp"
display_name = "Gemma 4 E4B"
command = "/usr/local/bin/llama-server"
args = [
    "-m", "/models/gemma-4-E4B-it-Q4_K_M.gguf",
    "--host", "127.0.0.1",
    "--port", "8081",
    "-c", "65536",
    "-ngl", "999",
]
backend_url = "http://127.0.0.1:8081/v1"
health_url = "http://127.0.0.1:8081/health"
priority = true

# Thinking model — reasoning enabled by default. Use max_tokens 2048+ in API requests.
[models.qwen3.5-9b]
backend = "llama.cpp"
display_name = "Qwen 3.5 9B"
command = "/usr/local/bin/llama-server"
args = [
    "-m", "/models/Qwen3.5-9B-Q4_K_M.gguf",
    "--host", "127.0.0.1",
    "--port", "8082",
    "-c", "65536",
    "-ngl", "999",
]
backend_url = "http://127.0.0.1:8082/v1"
health_url = "http://127.0.0.1:8082/health"
