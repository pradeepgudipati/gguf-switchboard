# GGUF Switchboard configuration
# See README.md for full documentation.

# Address to bind the HTTP server
bind = "0.0.0.0:9090"

# Maximum seconds to wait for a backend to become healthy
startup_timeout = 60

# Seconds of idle time before the priority model auto-loads
idle_timeout = 600

# Default backend engine
default_backend = "llama.cpp"

# Assumed GPU capacity in GB — heuristic for per-model context (-c) when not set in models.toml.
# RTX 3060 = 12; does not query live GPU memory.
vram_gb = 12

# Seconds to wait for in-flight requests before switching models
switch_drain_timeout_secs = 120

# Seconds to skip priority-model reload after a failed load
priority_load_cooldown_secs = 300

# Path to token usage SQLite database (defaults to token_usage.db)
database_path = "/var/lib/gguf-switchboard/usage.db"

# ─── Models ───────────────────────────────────────────────────────────────────
# Models are defined in models.toml using short aliases.
# deploy.sh auto-generates models.toml on first install (or with --refresh-models).
# Manual generation:  ./gguf-switchboard discover-models /models -o models.toml
models_file = "models.toml"